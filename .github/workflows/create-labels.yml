name: Create Labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const yaml = require("js-yaml");

            const content = fs.readFileSync(".github/labels.yml", "utf8");
            const labels = yaml.load(content);

            if (!Array.isArray(labels)) {
              throw new Error("labels.yml must contain an array of label objects");
            }

            for (const label of labels) {
              if (!label.name) {
                console.warn("Skipping label without name:", label);
                continue;
              }

              const color = (label.color || "ffffff").replace(/^#/, "");
              const description = label.description || "";

              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color,
                  description
                });
                console.log(`Created label: ${label.name}`);
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }

                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  current_name: label.name,
                  name: label.name,
                  color,
                  description
                });
                console.log(`Updated label: ${label.name}`);
              }
            }
